# Full documentation pipeline in Docker (Sphinx + OpenAPI + default MkDocs), then
# NRL-only MkDocs (`make docs-ci`: mkdocs.nrl-github-pages.yml --strict). Does NOT publish to GitHub Pages.
#
# Public documentation at https://nvidia.github.io/NeMo-Retriever/ is deployed only by
# nrl-docs-github-pages.yml (NeMo Retriever Library MkDocs: mkdocs.nrl-github-pages.yml).
name: Documentation build (full pipeline, CI only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-full-docker-ci
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation (Docker)
    runs-on: linux-large-disk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: ./.github/actions/setup-docker-buildx

      - name: Build documentation Docker image
        run: |
          docker build \
            --target docs \
            --build-arg GIT_COMMIT=${GITHUB_SHA} \
            -t nv-ingest-docs:latest \
            .

      - name: Run documentation build container (full docs + NRL MkDocs strict)
        run: |
          CONTAINER_ID=$(docker run -d nv-ingest-docs:latest)
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Wait for documentation generation
        run: |
          EXIT_CODE=$(docker wait $CONTAINER_ID)
          docker logs $CONTAINER_ID
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Error: docs build failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Copy generated docs from container
        run: docker cp $CONTAINER_ID:/workspace/docs/site ./generated-site

      - name: Clean up container
        if: always()
        run: docker rm -f $CONTAINER_ID
