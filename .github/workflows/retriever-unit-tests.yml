name: Retriever Unit Tests

on:
  # push: only default branch — feature-branch pushes also fire pull_request when a
  # PR exists, so a broad push trigger duplicates every PR synchronize.
  push:
    branches:
      - main
  pull_request:

jobs:
  retriever-unit-tests:
    name: Run Retriever Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install unit test dependencies
        run: |
          uv pip install --system -e src/ -e api/ -e client/
          uv pip install --system -e nemo_retriever

      - name: Run retriever unit tests
        env:
          PYTHONPATH: nemo_retriever/src
        run: python -m pytest nemo_retriever/tests -q
