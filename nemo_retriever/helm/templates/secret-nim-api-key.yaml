{{/*
Chart-managed Secret holding the NIM / NVIDIA API key. Skipped when the
user pointed `nimApiKey.existingSecret` at a pre-existing Secret OR left
the value blank (no key needed if all NIMs are in-cluster and unauthenticated).
*/}}
{{- if and (not .Values.nimApiKey.existingSecret) .Values.nimApiKey.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nemo-retriever.nimApiKeySecretName" . }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.nimApiKey.existingSecretKey }}: {{ .Values.nimApiKey.value | quote }}
{{- end }}
