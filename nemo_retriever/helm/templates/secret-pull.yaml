{{/*
Chart-managed dockerconfigjson Secret used to pull NVCR (or any private)
images. Off by default — most clusters will already have an NGC pull
secret. Two ways to populate:

  1. Provide imagePullSecret.dockerconfigjson (full JSON, base64 encoded)
  2. Provide imagePullSecret.{registry,username,password}; the chart
     assembles the JSON for you.
*/}}
{{- if .Values.imagePullSecret.create }}
{{- $name := .Values.imagePullSecret.name | required "imagePullSecret.name is required when imagePullSecret.create=true" }}
{{- $payload := "" }}
{{- if .Values.imagePullSecret.dockerconfigjson }}
{{- $payload = .Values.imagePullSecret.dockerconfigjson }}
{{- else }}
{{- $registry := .Values.imagePullSecret.registry | required "imagePullSecret.registry required when create=true and dockerconfigjson is empty" }}
{{- $username := .Values.imagePullSecret.username | required "imagePullSecret.username required when create=true and dockerconfigjson is empty" }}
{{- $password := .Values.imagePullSecret.password | required "imagePullSecret.password required when create=true and dockerconfigjson is empty" }}
{{- $auth := printf "%s:%s" $username $password | b64enc }}
{{- $cfg := dict "auths" (dict $registry (dict "username" $username "password" $password "auth" $auth)) }}
{{- $payload = $cfg | toJson | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $payload | quote }}
{{- end }}
