{{- if .Values.service.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nemo-retriever.serviceAccountName" . }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
  {{- with .Values.service.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
