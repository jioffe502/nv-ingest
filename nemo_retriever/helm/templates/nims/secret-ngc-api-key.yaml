{{/*
NGC_API_KEY Secret for the NIM sub-stack. Skipped when the user already
supplied an existingSecret OR when nims.enabled is false OR when no value
was provided.
*/}}
{{- if and .Values.nims.enabled (not .Values.nims.ngcApiKey.existingSecret) .Values.nims.ngcApiKey.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nemo-retriever.ngcApiKeySecretName" . }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
    app.kubernetes.io/component: nim
type: Opaque
stringData:
  {{ .Values.nims.ngcApiKey.existingSecretKey }}: {{ .Values.nims.ngcApiKey.value | quote }}
{{- end }}
